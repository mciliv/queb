  # Local/Self-hosted - Ollama
  - model_name: llama-3-3
    litellm_params:
      model: ollama/llama3.3
      api_base: http://localhost:11434

  - model_name: qwen-2-5
    litellm_params:
      model: ollama/qwen2.5
      api_base: http://localhost:11434

# Router settings for load balancing
router_settings:
  routing_strategy: simple-shuffle  # Distribute requests evenly
  allowed_fails: 3  # Retry up to 3 times
  cooldown_time: 30  # 30 seconds before retrying failed deployment
  num_retries: 3

# LiteLLM module settings
litellm_settings:
  drop_params: true  # Drop unsupported params instead of erroring
  set_verbose: false  # Set to true for debugging
  json_logs: true
  success_callback: ["prometheus"]  # Enable Prometheus metrics
  failure_callback: ["prometheus"]

# General proxy settings
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY  # Required for auth
  database_url: os.environ/DATABASE_URL  # PostgreSQL for persistence
  
  # Default model aliases
  default_models:
    chat: gpt-4o  # Default for chat completions
    reasoning: o1  # Default for reasoning tasks
    vision: grok-2-vision  # Default for vision tasks
    fast: gpt-4o-mini  # Default for fast responses
    
  # Cost tracking
  max_budget: 100  # $100 default budget
  budget_duration: 30d  # Reset monthly
  
  # Rate limiting (requests per minute)
  rpm_limit: 1000
  tpm_limit: 200000  # Tokens per minute
  
  # Timeouts
  request_timeout: 600  # 10 minutes for long requests
  
  # Alerts
  alerting: ["slack"]
  alerting_threshold: 300  # Alert when more than 300 errors

# Environment variables for alerts (optional)
environment_variables:
  SLACK_WEBHOOK_URL: os.environ/SLACK_WEBHOOK_URL
